allowBuilds:
  cmark-gfm: set this to true or false
  esbuild: set this to true or false
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: ^0.1.22
  vitest: npm:@voidzero-dev/vite-plus-test@^0.1.22
onlyBuiltDependencies:
  - cmark-gfm
  - esbuild
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
